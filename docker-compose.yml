services:
  postgres:
    image: postgres:16-alpine
    container_name: wfm-naumen-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - wfm_postgres_data:/var/lib/postgresql/data
    networks:
      - wfm_internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # For local debugging only:
    # ports:
    #   - "127.0.0.1:5432:5432"

  redis:
    image: redis:7-alpine
    container_name: wfm-naumen-redis
    volumes:
      - wfm_redis_data:/data
    networks:
      - wfm_internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: wfm-naumen-backend
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:${BACKEND_PORT}:8000"
    volumes:
      - .:/opt/wfm-naumen:ro
    networks:
      - wfm_internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    container_name: wfm-naumen-frontend
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "127.0.0.1:${FRONTEND_PORT}:5173"
    networks:
      - wfm_internal

  scheduler:
    build:
      context: ./scheduler
    container_name: wfm-naumen-scheduler
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:${SCHEDULER_PORT}:8010"
    networks:
      - wfm_internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/health', timeout=3).read()"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  wfm_internal:
    driver: bridge

volumes:
  wfm_postgres_data:
  wfm_redis_data:
